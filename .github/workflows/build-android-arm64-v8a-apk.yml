name: Build Android arm64 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"

      - name: Create temporary keystore
        run: |
          cd simple_live_app/android

          keytool -genkeypair \
            -v \
            -keystore app/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias upload \
            -dname "CN=Android,O=Android,C=US"

          echo "storeFile=upload-keystore.jks" > key.properties
          echo "storePassword=android" >> key.properties
          echo "keyPassword=android" >> key.properties
          echo "keyAlias=upload" >> key.properties

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build arm64 release APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
